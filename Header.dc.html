<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/gva-pharmatrace-hub-design-system-019f029c-e807-4be6-8e55-44649c0bec73/tokens/fonts.css">
  <link rel="stylesheet" href="_ds/gva-pharmatrace-hub-design-system-019f029c-e807-4be6-8e55-44649c0bec73/tokens/colors.css">
  <link rel="stylesheet" href="_ds/gva-pharmatrace-hub-design-system-019f029c-e807-4be6-8e55-44649c0bec73/tokens/typography.css">
  <link rel="stylesheet" href="_ds/gva-pharmatrace-hub-design-system-019f029c-e807-4be6-8e55-44649c0bec73/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/gva-pharmatrace-hub-design-system-019f029c-e807-4be6-8e55-44649c0bec73/tokens/base.css">
  <link rel="stylesheet" href="_ds/gva-pharmatrace-hub-design-system-019f029c-e807-4be6-8e55-44649c0bec73/styles.css">
</helmet>
<header style="position:sticky;top:0;z-index:60;background:rgba(255,255,255,0.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid var(--border-subtle);font-family:var(--font-body);">
  <div style="max-width:1320px;margin:0 auto;padding:0 32px;height:74px;display:flex;align-items:center;justify-content:space-between;gap:20px;">
    <a href="Inicio.dc.html" style="display:flex;align-items:center;gap:11px;text-decoration:none;flex:none;">
      <img src="assets/logos/pharmatrace-mark-red.svg" alt="GVA PharmaTrace Hub" style="height:36px;width:auto;display:block;">
      <span style="font-family:var(--font-display);font-weight:800;font-size:18px;letter-spacing:-0.02em;color:var(--indigo-700);line-height:1;">GVA <span style="color:var(--red-600);">PharmaTrace</span> Hub</span>
    </a>
    <nav style="display:flex;align-items:center;gap:2px;">
      <sc-for list="{{ nav }}" as="item" hint-placeholder-count="4">
        <a href="{{ item.href }}" style="{{ item.style }}">{{ item.label }}</a>
      </sc-for>
    </nav>
    <div style="display:flex;align-items:center;gap:14px;flex:none;">
      <div style="display:flex;align-items:center;gap:2px;background:var(--grey-100);border:1px solid var(--border-subtle);border-radius:8px;padding:3px;">
        <button onClick="{{ setES }}" style="{{ langES }}">ES</button>
        <button onClick="{{ setVA }}" style="{{ langVA }}">VA</button>
        <button onClick="{{ setEN }}" style="{{ langEN }}">EN</button>
      </div>
    </div>
  </div>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1320,&quot;height&quot;:74},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;inicio&quot;,&quot;espacio&quot;,&quot;equipo&quot;,&quot;etica&quot;,&quot;contacto&quot;],&quot;default&quot;:&quot;inicio&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { lang: 'ES' };

  phmtBroadcastLang(l) {
    (window._phmtLangListeners || []).forEach(fn => fn(l));
  }

  renderVals() {
    const active = this.props.active || 'inicio';
    const items = [
      { key: 'inicio', label: 'Inicio', href: 'Inicio.dc.html' },
      { key: 'espacio', label: 'Espacio de Datos', href: 'Espacio-de-Datos.dc.html' },
      { key: 'equipo', label: 'Equipo', href: 'Equipo.dc.html' },
      { key: 'etica', label: 'Ética y Seguridad', href: 'Etica-y-Seguridad.dc.html' },
      { key: 'contacto', label: 'Contacto', href: 'Contacto.dc.html' },
    ];
    const linkBase = 'font-family:var(--font-display);font-size:14.5px;font-weight:600;letter-spacing:-0.01em;text-decoration:none;padding:9px 14px;border-radius:9px;transition:background 160ms,color 160ms;white-space:nowrap;';
    const nav = items.map(it => ({
      label: it.label,
      href: it.href,
      style: it.key === active
        ? linkBase + 'color:var(--indigo-700);background:var(--indigo-50);'
        : linkBase + 'color:var(--grey-600);background:transparent;',
    }));

    const chip = (l) => {
      const on = this.state.lang === l;
      return 'border:none;cursor:pointer;padding:4px 9px;border-radius:6px;font-family:var(--font-display);font-weight:700;font-size:12px;letter-spacing:0.02em;transition:all 140ms;'
        + (on ? 'background:var(--indigo-700);color:#fff;' : 'background:transparent;color:var(--grey-500);');
    };

    return {
      nav,
      langES: chip('ES'), langVA: chip('VA'), langEN: chip('EN'),
      setES: () => { this.setState({ lang: 'ES' }); this.phmtBroadcastLang('ES'); },
      setVA: () => { this.setState({ lang: 'VA' }); this.phmtBroadcastLang('VA'); },
      setEN: () => { this.setState({ lang: 'EN' }); this.phmtBroadcastLang('EN'); },
    };
  }
}
</script>
</body>
</html>
